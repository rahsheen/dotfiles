set -g bell-action none
set -g visual-bell on
set -g detach-on-destroy off

bind r source-file ~/.tmux.conf
set -g base-index 1

set-window-option -g mode-keys vi

# vim-like pane switching
# bind -r k select-pane -U
# bind -r j select-pane -D
#bind -r h select-pane -L
#bind -r l select-pane -R

# last window
bind-key C-b last-window
bind-key b send-prefix

# move window
bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

# forget the find window.  That is for chumps
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
bind-key -r i run-shell "tmux neww tmux-cht.sh"
bind-key -r v run-shell "tmux neww nvim ."


## COLORSCHEME: gruvbox dark (medium)
set-option -g status "on"

# default statusbar color
set-option -g status-style bg=colour237,fg=colour223 # bg=bg1, fg=fg1

# default window title colors
set-window-option -g window-status-style bg=colour214,fg=colour237 # bg=yellow, fg=bg1

# default window with an activity alert
set-window-option -g window-status-activity-style bg=colour237,fg=colour248 # bg=bg1, fg=fg3

# active window title colors
set-window-option -g window-status-current-style bg=red,fg=colour237 # fg=bg1

# pane border
set-option -g pane-active-border-style fg=colour250 #fg2
set-option -g pane-border-style fg=colour237 #bg1

# message infos
set-option -g message-style bg=colour239,fg=colour223 # bg=bg2, fg=fg1

# writing commands inactive
set-option -g message-command-style bg=colour239,fg=colour223 # bg=fg3, fg=bg1

# pane number display
set-option -g display-panes-active-colour colour250 #fg2
set-option -g display-panes-colour colour237 #bg1

# clock
set-window-option -g clock-mode-colour colour109 #blue

# bell
set-window-option -g window-status-bell-style bg=colour167,fg=colour235 # bg=red, fg=bg

## --- STATUS BAR VISUALS ---
set-option -g status-justify "left"
set-option -g status-left-length "80"
set-option -g status-right-length "80"

# [Session Name] ->
set-option -g status-left "#[bg=colour214,fg=colour237,bold] #S #[bg=colour237,fg=colour214,nobold]"

# Window Tabs
set-window-option -g window-status-current-format "#[fg=colour237,bg=colour239,nobold]#[fg=colour223,bg=colour239] #I #[fg=colour223,bg=colour239,bold]#W #[fg=colour239,bg=colour237,nobold]"
set-window-option -g window-status-format "#[fg=colour237,bg=colour237,nobold]#[fg=colour243,bg=colour237] #I #W #[fg=colour237,bg=colour237,nobold]"

# <- [Hostname] <- [Current Folder]
set-option -g status-right "#[fg=colour248]#[bg=colour248,fg=colour237] #h #[bg=colour248,fg=colour114]#[bg=colour114,fg=colour237]#{pane_current_command}#[bg=colour114,fg=colour214]#[bg=colour214,fg=colour237,bold] #{b:pane_current_path} "

